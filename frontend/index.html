<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Pervasive Computing Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="dashboard.js"></script>
</head>

<body>
    <div class="heading">
        <h1>Allergy Exposure Data Portal</h1>
        <p id="timestamp">Last updated: --</p>
    </div>

    <div class="grid">
        <div class="grid-item">
            <label>Temperature</label>
            <div class="grid-item-data" id="temp-sensor">-- °C</div>
        </div>
        <div class="grid-item">
            <label>Humidity</label>
            <div class="grid-item-data" id="humidity-sensor">-- %</div>
        </div>
        <div class="grid-item">
            <label>Dust Pollution</label>
            <div class="grid-item-data" id="dust-sensor">-- ppm?</div>
        </div>
        <div class="grid-item highlight">
            <label>CO2 Level</label>
            <div class="grid-item-data" id="co2-sensor">-- ppm?</div>
        </div>
    </div>
</body>

</html>
