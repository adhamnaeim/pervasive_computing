<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Pervasive Computing Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="dashboard.js"></script>
</head>

<body style="background-color: rgb(70, 132, 50);">
    <h1 style="text-align: center; background-color: rgb(154, 216, 114); width: auto; height: auto; margin: 0px 0px 10px 0px; padding: 10px 0 10px 0;" >Allergy Dashboard</h1>
    <div class="flexContainer">
        <div class="flexChildren">
            <h4 class="flexChildren-title">Temperature (C°)</h4>
            <div id="temp-sensor">-data here-</div>
        </div>
        <div class="flexChildren">
            <h4 class="flexChildren-title">Humidity (%)</h4>
            <div id="humidity-sensor">-data here-</div>
        </div>
        <div class="flexChildren">
            <h4 class="flexChildren-title">Dust Pollution</h4>
            <div id="dust-sensor">-data here-</div>
        </div>
        <div class="flexChildren">
            <h4 class="flexChildren-title">CO2 Pollution</h4>
            <div id="co2-sensor">-data here-</div>
        </div>
        <div class="flexChildren">
            <h4 class="flexChildren-title">CO Pollution</h4>
            <div id="co-sensor">-data here-</div>
        </div>
    </div>
</body>

</html>
